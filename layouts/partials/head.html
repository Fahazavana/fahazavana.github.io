<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script>
		(function() {
			try {
				var storedTheme = localStorage.getItem("theme");
				var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
				var useDark = storedTheme === "dark" || (!storedTheme && prefersDark);
				document.documentElement.classList.toggle("dark", useDark);
			} catch (error) {}
		})();
	</script>
	{{ partial "seo.html" . }}
	{{ if .IsHome }}
	<link rel="preload" as="image" href="{{ "images/profile.webp" | relURL }}" type="image/webp" />
	{{ end }}
	<meta name="color-scheme" content="light dark" />
	<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
	{{ partialCached "css.html" . }}
	{{/* Third-party stylesheets (Font Awesome) loaded async so they don't block first paint. */}}
	{{ range .Site.Params.plugins.css }}
	<link rel="stylesheet" href="{{ .link | relURL }}" media="print" onload="this.media='all'" />
	<noscript><link rel="stylesheet" href="{{ .link | relURL }}" /></noscript>
	{{ end }}
	<link rel="manifest" href="{{ "manifest.webmanifest" | relURL }}" />
	<link rel="icon" type="image/png" href="{{ .Site.Params.favicon }}" />
	<link rel="icon" type="image/png" sizes="32x32" href="{{ "images/favicon_io/favicon-32x32.png" | relURL }}" />
	<link rel="icon" type="image/png" sizes="16x16" href="{{ "images/favicon_io/favicon-16x16.png" | relURL }}" />
	<link rel="apple-touch-icon" href="{{ "images/favicon_io/apple-touch-icon.png" | relURL }}" />
	<meta name="theme-color" media="(prefers-color-scheme: light)" content="{{ .Site.Params.themeColor.light }}" />
	<meta name="theme-color" media="(prefers-color-scheme: dark)" content="{{ .Site.Params.themeColor.dark }}" />
</head>
